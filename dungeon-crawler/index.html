<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0c0c14">
  <meta name="description" content="Depths of Shadow — A 100-floor dungeon crawler">

  <title>Depths of Shadow</title>

  <!-- Icons -->

  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- PWA Manifest -->

  <link rel="manifest" href="manifest.json">

  <!-- Styles -->

  <link rel="stylesheet" href="style.css">

  <!-- React (CDN) -->

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

</head>
<body>
  <!-- Loading screen (hidden once game mounts) -->
  <div id="loader">
    <h1>DEPTHS OF SHADOW</h1>
    <p>LOADING</p>
    <div class="spinner"></div>
  </div>

  <!-- Game root -->

  <div id="root"></div>

  <!-- Game (pre-compiled, no Babel needed) -->

  <script src="game.js"></script>

  <!-- Service Worker registration -->

  <script>
    // Hide loader once game renders
    const observer = new MutationObserver(() => {
      if (document.getElementById('root').children.length > 0) {
        const loader = document.getElementById('loader');
        if (loader) { loader.classList.add('hidden'); setTimeout(() => loader.remove(), 500); }
        observer.disconnect();
      }
    });
    observer.observe(document.getElementById('root'), { childList: true });

    // Register service worker for offline play
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>

</body>
</html>
