<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0c0c14"/>
  <rect x="40" y="40" width="432" height="432" rx="64" fill="#13110d" stroke="#d4a843" stroke-width="4" opacity="0.5"/>
  <!-- Dungeon walls -->
  <g fill="#55503a" opacity="0.4">
    <rect x="80" y="80" width="40" height="40" rx="4"/>
    <rect x="130" y="80" width="40" height="40" rx="4"/>
    <rect x="80" y="130" width="40" height="40" rx="4"/>
    <rect x="342" y="80" width="40" height="40" rx="4"/>
    <rect x="392" y="80" width="40" height="40" rx="4"/>
    <rect x="392" y="130" width="40" height="40" rx="4"/>
    <rect x="80" y="342" width="40" height="40" rx="4"/>
    <rect x="80" y="392" width="40" height="40" rx="4"/>
    <rect x="130" y="392" width="40" height="40" rx="4"/>
    <rect x="342" y="392" width="40" height="40" rx="4"/>
    <rect x="392" y="342" width="40" height="40" rx="4"/>
    <rect x="392" y="392" width="40" height="40" rx="4"/>
  </g>
  <!-- Player orb -->
  <circle cx="256" cy="256" r="48" fill="url(#playerGrad)"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="#d4a843" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="72" fill="none" stroke="#d4a843" stroke-width="1" opacity="0.15"/>
  <!-- Swords -->
  <g transform="translate(256,256)">
    <line x1="-90" y1="-90" x2="-40" y2="-40" stroke="#d4a843" stroke-width="6" stroke-linecap="round"/>
    <line x1="-56" y1="-74" x2="-74" y2="-56" stroke="#d4a843" stroke-width="4" stroke-linecap="round"/>
    <line x1="90" y1="-90" x2="40" y2="-40" stroke="#d4a843" stroke-width="6" stroke-linecap="round"/>
    <line x1="56" y1="-74" x2="74" y2="-56" stroke="#d4a843" stroke-width="4" stroke-linecap="round"/>
  </g>
  <!-- Title text -->
  <text x="256" y="420" text-anchor="middle" fill="#d4a843" font-family="serif" font-size="36" font-weight="bold" letter-spacing="4">DoS</text>
  <defs>
    <radialGradient id="playerGrad" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#ffe88a"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#a07020"/>
    </radialGradient>
  </defs>
